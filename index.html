<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H0MJOO — Sydney</title>

<!-- Favicon inline (logo nella tab) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='115' fill='%23FF4533'/><rect x='118' y='128' width='58' height='256' rx='29' fill='white'/><rect x='336' y='128' width='58' height='256' rx='29' fill='white'/><path d='M256 320L232 280L280 280Z' fill='white'/><circle cx='256' cy='240' r='58' fill='white'/><circle cx='256' cy='240' r='22' fill='%23FF4533'/></svg>">

<!-- MapLibre da cdnjs (Cloudflare) - il CDN più affidabile -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #fafaf7;
    --bg-elev: #ffffff;
    --ink: #0a0a0a;
    --ink-soft: #4a4a48;
    --ink-faint: #8a8a86;
    --line: rgba(10,10,10,0.08);
    --accent: #ff5a3c;
    --accent-soft: #fff0ec;
    --job: #1f6feb;
    --home: #16a34a;
    --shadow-sm: 0 1px 2px rgba(10,10,10,0.04), 0 1px 3px rgba(10,10,10,0.06);
    --shadow-md: 0 4px 12px rgba(10,10,10,0.06), 0 2px 4px rgba(10,10,10,0.04);
    --shadow-lg: 0 24px 60px rgba(10,10,10,0.12), 0 8px 24px rgba(10,10,10,0.08);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 22px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-ui: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font-ui);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* MAP - sempre sotto, riempie tutto */
  #map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100vh;
    background: #e8e8e0; /* fallback se i tile non caricano */
  }

  .maplibregl-ctrl-attrib { font-size: 10px; opacity: 0.6; }
  .maplibregl-ctrl-bottom-right { bottom: 24px; right: 24px; }

  /* TOP BAR */
  .topbar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 8px 8px 20px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--line);
    border-radius: 100px;
    box-shadow: var(--shadow-md);
    width: min(720px, calc(100vw - 32px));
  }

  .brand {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 16px;
    border-right: 1px solid var(--line);
    margin-right: 4px;
    line-height: 1;
  }

  .brand-logo {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
    display: block;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(255, 90, 60, 0.28), 0 1px 2px rgba(255, 90, 60, 0.15);
  }

  .brand-name {
    display: inline-flex;
    align-items: baseline;
    font-feature-settings: 'ss01';
    line-height: 1;
    letter-spacing: -0.01em;
    /* Tutte le lettere allo stesso peso per un wordmark uniforme */
    font-weight: 700;
  }

  /* Lo "0" stesso peso delle altre lettere, solo colorato di arancione.
     Niente font-weight diverso → niente effetto "ballerino". */
  .brand-name .zero {
    color: var(--accent);
    font-weight: 700;
    /* Il numero 0 in Fraunces è leggermente diverso dalla O maiuscola in altezza:
       compenso con un piccolo aggiustamento ottico */
    display: inline-block;
    transform: translateY(0.5px);
  }

  .search {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: transparent;
    border-radius: 100px;
    transition: background 0.2s;
  }

  .search:hover { background: rgba(10,10,10,0.03); }
  .search svg { flex-shrink: 0; color: var(--ink-faint); }

  .search input {
    flex: 1;
    border: 0;
    background: transparent;
    font-family: var(--font-ui);
    font-size: 14.5px;
    color: var(--ink);
    outline: none;
  }

  .search input::placeholder { color: var(--ink-faint); }

  .city-pill {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    background: rgba(10,10,10,0.05);
    padding: 5px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }

  .btn-pro {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    background: var(--ink);
    color: white;
    border: 0;
    border-radius: 100px;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }

  .btn-pro:hover { background: #1a1a1a; transform: scale(1.02); }
  .btn-pro::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* FILTRI */
  .filters {
    position: fixed;
    top: 84px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    display: flex;
    gap: 8px;
    padding: 6px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--line);
    border-radius: 100px;
    box-shadow: var(--shadow-sm);
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 0;
    background: transparent;
    border-radius: 100px;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .chip:hover { background: rgba(10,10,10,0.04); color: var(--ink); }
  .chip.active { background: var(--ink); color: white; }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; }
  .chip .dot.job { background: var(--job); }
  .chip .dot.home { background: var(--home); }
  .chip.active .dot { background: white; }

  /* PIN
     Il wrapper esterno (.pin) è quello che MapLibre posiziona con transform.
     Deve restare PULITO, senza display/width/position interferenti.
     Lo stile visivo va sul figlio interno (.pin-inner). */
  .pin {
    cursor: pointer;
    will-change: transform;
  }

  .pin-inner {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px 7px 7px;
    background: white;
    border-radius: 100px;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    box-shadow: 0 4px 14px rgba(10,10,10,0.18), 0 1px 3px rgba(10,10,10,0.1);
    white-space: nowrap;
    user-select: none;
    transition: transform 0.18s, box-shadow 0.18s;
  }

  .pin:hover .pin-inner {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(10,10,10,0.22), 0 2px 4px rgba(10,10,10,0.12);
  }

  .pin-inner .icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
  }

  .pin.job .pin-inner .icon { background: var(--job); }
  .pin.home .pin-inner .icon { background: var(--home); }

  .pin.active .pin-inner {
    background: var(--ink);
    color: white;
    transform: scale(1.08);
  }

  /* PANNELLO */
  .panel {
    position: fixed;
    top: 16px;
    right: 16px;
    bottom: 16px;
    width: 380px;
    background: var(--bg-elev);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 18;
    transform: translateX(420px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s;
  }

  .panel.open { transform: translateX(0); opacity: 1; pointer-events: auto; }

  .panel-image {
    height: 200px;
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  .panel-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(10,10,10,0.3));
  }

  .panel-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: transform 0.15s;
    z-index: 2;
  }

  .panel-close:hover { transform: scale(1.1); }

  .panel-tag {
    position: absolute;
    top: 14px;
    left: 14px;
    padding: 6px 10px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .panel-tag .dot { width: 6px; height: 6px; border-radius: 50%; }
  .panel-tag.job .dot { background: var(--job); }
  .panel-tag.home .dot { background: var(--home); }

  .panel-content { padding: 24px; overflow-y: auto; flex: 1; }

  .panel-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .panel-sub {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .panel-price {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .panel-price-unit {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 400;
    color: var(--ink-faint);
  }

  .panel-divider { height: 1px; background: var(--line); margin: 20px 0; }

  .panel-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .meta-item { padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }

  .meta-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-faint);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .meta-value { font-size: 14px; font-weight: 500; color: var(--ink); }

  .panel-desc {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }

  .panel-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: white;
    border: 0;
    border-radius: var(--radius);
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }

  .panel-cta:hover { background: #1a1a1a; transform: scale(1.01); }

  .panel-source {
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
    margin-top: 12px;
  }

  /* STATS */
  .stats {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 15;
    display: flex;
    gap: 8px;
  }

  .stat-card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stat-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
  }

  .stat-icon.job { background: var(--job); }
  .stat-icon.home { background: var(--home); }
  .stat-text { display: flex; flex-direction: column; line-height: 1.2; }
  .stat-num { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--ink); }
  .stat-label { font-size: 11px; color: var(--ink-faint); font-weight: 500; }

  /* CONTROLLI */
  .controls {
    position: fixed;
    right: 24px;
    bottom: 60px;
    z-index: 15;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: right 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .panel.open ~ .controls { right: 416px; }

  .ctrl-btn {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: transform 0.15s, background 0.15s;
  }

  .ctrl-btn:hover { background: white; transform: scale(1.05); }
  .ctrl-btn:active { transform: scale(0.95); }

  /* SCHERMATA ERRORE */
  .error-screen {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .error-screen.show { display: flex; }

  .error-card {
    max-width: 460px;
    text-align: center;
    background: white;
    border-radius: 22px;
    padding: 40px 32px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
  }

  .error-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .error-card h2 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .error-card p {
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .error-card button {
    padding: 12px 24px;
    background: var(--ink);
    color: white;
    border: 0;
    border-radius: 100px;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .topbar { width: calc(100vw - 16px); top: 8px; padding: 6px 6px 6px 14px; }
    .brand { font-size: 16px; padding-right: 10px; }
    .city-pill { display: none; }
    .filters { top: 70px; }
    .panel { left: 8px; right: 8px; bottom: 8px; top: auto; width: auto; height: 60vh; }
    .stats { bottom: 16px; left: 8px; }
    .controls { right: 8px; bottom: 90px; }
    .panel.open ~ .controls { right: 8px; bottom: calc(60vh + 16px); }
  }
</style>
</head>
<body>

<!-- MAPPA SOTTO TUTTO -->
<div id="map"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <svg class="brand-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-label="H0MJOO logo">
      <defs>
        <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FF6B47"/>
          <stop offset="100%" stop-color="#FF3D2E"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#logoBg)"/>
      <rect x="118" y="128" width="58" height="256" rx="29" ry="29" fill="white"/>
      <rect x="336" y="128" width="58" height="256" rx="29" ry="29" fill="white"/>
      <path d="M 256 320 L 232 280 L 280 280 Z" fill="white"/>
      <circle cx="256" cy="240" r="58" fill="white"/>
      <circle cx="256" cy="240" r="22" fill="#FF4533"/>
    </svg>
    <span class="brand-name">H<span class="zero">0</span>MJOO</span>
  </div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" placeholder="Cerca lavori, quartieri, case…">
    <span class="city-pill">📍 Sydney</span>
  </div>
  <button class="btn-pro">Passa a Pro</button>
</div>

<!-- FILTRI -->
<div class="filters">
  <button class="chip active" data-filter="all">Tutto</button>
  <button class="chip" data-filter="job"><span class="dot job"></span>Lavori</button>
  <button class="chip" data-filter="home"><span class="dot home"></span>Case</button>
</div>

<!-- CONTROLLI MAPPA -->
<div class="controls">
  <button class="ctrl-btn" id="zoomIn" title="Zoom +">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <button class="ctrl-btn" id="zoomOut" title="Zoom -">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>
  </button>
  <button class="ctrl-btn" id="recenter" title="Ricentra">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
  </button>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-icon job">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
    </div>
    <div class="stat-text">
      <span class="stat-num" id="jobCount">—</span>
      <span class="stat-label">lavori a Sydney</span>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
    </div>
    <div class="stat-text">
      <span class="stat-num" id="homeCount">—</span>
      <span class="stat-label">case disponibili</span>
    </div>
  </div>
</div>

<!-- PANNELLO DETTAGLIO -->
<div class="panel" id="panel">
  <div class="panel-image" id="panelImage">
    <div class="panel-tag" id="panelTag"><span class="dot"></span><span id="panelTagText"></span></div>
    <button class="panel-close" id="panelClose">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="panel-content">
    <h2 class="panel-title" id="panelTitle"></h2>
    <p class="panel-sub" id="panelSub"></p>
    <div class="panel-price" id="panelPrice"></div>
    <div class="panel-divider"></div>
    <div class="panel-meta" id="panelMeta"></div>
    <p class="panel-desc" id="panelDesc"></p>
    <button class="panel-cta" id="panelCta"></button>
    <p class="panel-source" id="panelSource"></p>
  </div>
</div>

<!-- SCHERMATA ERRORE (solo se MapLibre non si carica) -->
<div class="error-screen" id="errorScreen">
  <div class="error-card">
    <div class="error-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    </div>
    <h2>Connessione richiesta</h2>
    <p>La mappa ha bisogno di internet per caricare i tile. Verifica la tua connessione e ricarica la pagina.</p>
    <button onclick="location.reload()">Riprova</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ============ CONTROLLO CHE MAPLIBRE SIA CARICATO ============
  if (typeof maplibregl === 'undefined') {
    document.getElementById('errorScreen').classList.add('show');
    console.error('MapLibre GL non si è caricato. Verifica connessione internet.');
    return;
  }

  // ============ DATI ============
  // Coordinate REALI verificate da Google Places per ogni quartiere/posto di Sydney
  const data = [
    { id: 'j1', type: 'job', title: 'Cameriere/a — The Rocks', company: 'Harbour Café', price: 32, unit: 'AUD/h', lng: 151.2080, lat: -33.8590,
      desc: 'Caffetteria storica vicino al porto, turni serali, no esperienza richiesta. Ottimo per Working Holiday Visa.',
      meta: { 'Tipo': 'Part-time', 'Lingua': 'Inglese base', 'Visa': 'WHV ok', 'Inizio': 'Subito' }, source: 'Adzuna' },
    { id: 'j2', type: 'job', title: 'Software Engineer (mid)', company: 'Atlassian', price: 120000, unit: 'AUD/anno', lng: 151.2065, lat: -33.8672,
      desc: 'Team backend in Java/Kotlin. Hybrid 3 giorni a settimana, sponsorship visa disponibile.',
      meta: { 'Tipo': 'Full-time', 'Hybrid': 'Sì', 'Visa': 'Sponsor', 'Esperienza': '3+ anni' }, source: 'JSearch' },
    { id: 'j3', type: 'job', title: 'Barista — Surry Hills', company: 'Single O Coffee', price: 30, unit: 'AUD/h', lng: 151.2140, lat: -33.8851,
      desc: 'Specialty coffee shop, turni mattina presto. Esperienza espresso preferita.',
      meta: { 'Tipo': 'Part-time', 'Turni': 'Mattina', 'Visa': 'WHV ok', 'Mance': 'Sì' }, source: 'Jora' },
    { id: 'j4', type: 'job', title: 'Magazziniere — Alexandria', company: 'Kogan Logistics', price: 28, unit: 'AUD/h', lng: 151.1903, lat: -33.9080,
      desc: 'Centro logistico, turni flessibili, no richiesta lingua avanzata. Bus diretto da City.',
      meta: { 'Tipo': 'Full-time', 'Turni': 'Flessibili', 'Visa': 'WHV ok', 'Inglese': 'Base' }, source: 'SEEK' },
    { id: 'j5', type: 'job', title: 'Receptionist hotel — Bondi', company: 'Bondi Beach Hotel', price: 29, unit: 'AUD/h', lng: 151.2745, lat: -33.8908,
      desc: 'Hotel boutique fronte spiaggia. Turni mattina/sera. Inglese conversazionale richiesto.',
      meta: { 'Tipo': 'Full-time', 'Turni': 'Rotanti', 'Visa': 'WHV ok', 'Inglese': 'Buono' }, source: 'Adzuna' },
    { id: 'j6', type: 'job', title: 'Sviluppatore Frontend (React)', company: 'Canva', price: 110000, unit: 'AUD/anno', lng: 151.2114, lat: -33.8854,
      desc: 'Team prodotto. React, TypeScript, sistema di design proprietario. Sponsorship 482 visa possibile.',
      meta: { 'Tipo': 'Full-time', 'Hybrid': 'Sì', 'Visa': 'Sponsor', 'Stack': 'React/TS' }, source: 'JSearch' },
    { id: 'j7', type: 'job', title: 'Cuoco di linea — Newtown', company: "Mary's Pizza", price: 33, unit: 'AUD/h', lng: 151.1785, lat: -33.8978,
      desc: 'Pizzeria iconica, atmosfera rock. Esperienza in cucina richiesta. Turni serali.',
      meta: { 'Tipo': 'Full-time', 'Turni': 'Sera', 'Visa': 'WHV ok', 'Esperienza': '1+ anno' }, source: 'Jora' },
    { id: 'j8', type: 'job', title: 'Insegnante italiano L2', company: 'Italian Cultural Institute', price: 45, unit: 'AUD/h', lng: 151.2262, lat: -33.8850,
      desc: 'Lezioni private e di gruppo. Madrelingua italiani. Part-time, orari serali.',
      meta: { 'Tipo': 'Part-time', 'Lingua': 'Italiano L1', 'Visa': 'Vari', 'Sede': 'Paddington' }, source: 'The Muse' },
    { id: 'h1', type: 'home', title: 'Stanza singola — Surry Hills', company: 'Casa condivisa, 4 inquilini', price: 380, unit: 'AUD/sett', lng: 151.2155, lat: -33.8862,
      desc: 'Stanza luminosa in casa condivisa con altri 3 expat. Wi-Fi, lavatrice, 5 min dalla metro Central.',
      meta: { 'Camere': '1 singola', 'Bagno': 'Condiviso', 'Bills': 'Inclusi', 'Min stay': '3 mesi' }, source: 'Flatmates' },
    { id: 'h2', type: 'home', title: 'Studio moderno — CBD', company: 'Appartamento intero', price: 620, unit: 'AUD/sett', lng: 151.2085, lat: -33.8706,
      desc: 'Studio al 18° piano con vista parziale Opera House. Ammobiliato. Palestra e piscina nel building.',
      meta: { 'Tipo': 'Studio', 'Mobili': 'Sì', 'Bills': 'Esclusi', 'Min stay': '6 mesi' }, source: 'Domain' },
    { id: 'h3', type: 'home', title: 'Stanza doppia — Bondi Junction', company: 'Casa condivisa, 5 inquilini', price: 320, unit: 'AUD/sett', lng: 151.2552, lat: -33.8928,
      desc: 'Stanza doppia ideale per coppie. Casa internazionale, atmosfera giovane. 10 min a piedi dalla spiaggia.',
      meta: { 'Camere': '1 doppia', 'Bagno': 'Condiviso', 'Bills': 'Inclusi', 'Min stay': '2 mesi' }, source: 'Flatmates' },
    { id: 'h4', type: 'home', title: 'Bilocale — Newtown', company: 'Appartamento intero', price: 580, unit: 'AUD/sett', lng: 151.1810, lat: -33.8965,
      desc: 'Bilocale in tipica casa terrazzata vittoriana. Quartiere artistico, pieno di caffè e locali.',
      meta: { 'Camere': '1 da letto', 'Mobili': 'Parziale', 'Bills': 'Esclusi', 'Min stay': '12 mesi' }, source: 'Domain' },
    { id: 'h5', type: 'home', title: 'Stanza singola — Glebe', company: 'Casa condivisa, 3 inquilini', price: 350, unit: 'AUD/sett', lng: 151.1870, lat: -33.8798,
      desc: "Vicino all'Università di Sydney, perfetto per studenti. Giardino comune, gatto residente friendly.",
      meta: { 'Camere': '1 singola', 'Bagno': 'Condiviso', 'Bills': 'Inclusi', 'Min stay': '3 mesi' }, source: 'Flatmates' },
    { id: 'h6', type: 'home', title: 'Loft — Alexandria', company: 'Appartamento intero', price: 690, unit: 'AUD/sett', lng: 151.1925, lat: -33.9090,
      desc: 'Loft industriale convertito, soffitti alti, mattoni a vista. Quartiere in trasformazione, tanti caffè nuovi.',
      meta: { 'Tipo': 'Loft', 'Mobili': 'Sì', 'Bills': 'Esclusi', 'Min stay': '6 mesi' }, source: 'Domain' },
    { id: 'h7', type: 'home', title: 'Stanza singola — Manly', company: 'Casa condivisa, 4 inquilini', price: 410, unit: 'AUD/sett', lng: 151.2840, lat: -33.7967,
      desc: 'A 8 minuti a piedi dalla spiaggia di Manly. Ferry diretto al CBD ogni 30 min. Stile surf/beach.',
      meta: { 'Camere': '1 singola', 'Bagno': 'Privato', 'Bills': 'Inclusi', 'Min stay': '3 mesi' }, source: 'Flatmates' },
    { id: 'h8', type: 'home', title: 'Stanza in appartamento — Chippendale', company: 'Casa condivisa, 2 inquilini', price: 360, unit: 'AUD/sett', lng: 151.1987, lat: -33.8861,
      desc: 'Appartamento moderno con due ragazze italiane. Vicino Central Park, palestra in edificio, sicuro.',
      meta: { 'Camere': '1 singola', 'Bagno': 'Condiviso', 'Bills': 'Inclusi', 'Min stay': '4 mesi' }, source: 'Spotahome' }
  ];

  const SYDNEY_CENTER = [151.2093, -33.8688];

  // ============ INIZIALIZZAZIONE MAPPA ============
  let map;
  try {
    map = new maplibregl.Map({
      container: 'map',
      style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
      center: SYDNEY_CENTER,
      zoom: 12.5,
      pitch: 0,
      bearing: 0,
      attributionControl: { compact: true }
    });

    map.dragRotate.disable();
    map.touchZoomRotate.disableRotation();
  } catch (err) {
    console.error('Errore creazione mappa:', err);
    document.getElementById('errorScreen').classList.add('show');
    return;
  }

  // Se la mappa non riesce a caricare lo stile (es. tile server giù), mostro errore
  map.on('error', (e) => {
    console.warn('Errore mappa:', e && e.error ? e.error.message : e);
    // Non blocco — la mappa potrebbe funzionare anche con errori parziali
  });

  // ============ HELPERS ============
  function formatPrice(item) {
    if (item.type === 'job') {
      if (item.unit === 'AUD/h') return '$' + item.price + '/h';
      if (item.unit === 'AUD/anno') return '$' + (item.price / 1000).toFixed(0) + 'k';
    }
    return '$' + item.price + '/sett';
  }

  function jobIcon() {
    return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>';
  }

  function homeIcon() {
    return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
  }

  // ============ PIN ============
  // Struttura: wrapper esterno (.pin) + contenuto interno (.pin-inner).
  // MapLibre posiziona il wrapper con transform; lo stile sta sull'inner.
  // Anchor 'center' tiene il pin centrato sulla coordinata (più stabile di 'bottom').
  const markers = [];

  function createPins() {
    data.forEach(item => {
      const el = document.createElement('div');
      el.className = 'pin ' + item.type;
      el.innerHTML =
        '<div class="pin-inner">' +
          '<span class="icon">' + (item.type === 'job' ? jobIcon() : homeIcon()) + '</span>' +
          '<span>' + formatPrice(item) + '</span>' +
        '</div>';

      el.addEventListener('click', function(e) {
        e.stopPropagation();
        openPanel(item, el);
      });

      const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
        .setLngLat([item.lng, item.lat])
        .addTo(map);

      markers.push({ marker: marker, el: el, item: item });
    });

    // Aggiorno conteggi
    const jobCount = data.filter(d => d.type === 'job').length;
    const homeCount = data.filter(d => d.type === 'home').length;
    document.getElementById('jobCount').textContent = String(jobCount).padStart(2, '0');
    document.getElementById('homeCount').textContent = String(homeCount).padStart(2, '0');
  }

  if (map.loaded()) {
    createPins();
  } else {
    map.on('load', createPins);
  }

  // ============ PANNELLO DETTAGLIO ============
  const panel = document.getElementById('panel');
  const panelClose = document.getElementById('panelClose');
  let activeEl = null;

  function openPanel(item, el) {
    if (activeEl) activeEl.classList.remove('active');
    el.classList.add('active');
    activeEl = el;

    document.getElementById('panelTitle').textContent = item.title;
    document.getElementById('panelSub').innerHTML =
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 7-8 13-8 13s-8-6-8-13a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg> ' + item.company;
    document.getElementById('panelPrice').innerHTML =
      formatPrice(item) + ' <span class="panel-price-unit">' + item.unit.replace('AUD/', '/') + '</span>';
    document.getElementById('panelDesc').textContent = item.desc;
    document.getElementById('panelSource').textContent = 'Fonte: ' + item.source;

    const tag = document.getElementById('panelTag');
    tag.className = 'panel-tag ' + item.type;
    document.getElementById('panelTagText').textContent = item.type === 'job' ? 'Lavoro' : 'Casa';

    const img = document.getElementById('panelImage');
    img.style.background = item.type === 'job'
      ? 'linear-gradient(135deg, #1f6feb, #0d4ec9)'
      : 'linear-gradient(135deg, #16a34a, #0e7d35)';

    const metaEl = document.getElementById('panelMeta');
    metaEl.innerHTML = '';
    Object.entries(item.meta).forEach(function(entry) {
      metaEl.innerHTML +=
        '<div class="meta-item"><div class="meta-label">' + entry[0] + '</div><div class="meta-value">' + entry[1] + '</div></div>';
    });

    const ctaText = (item.type === 'job' ? 'Candidati su ' : 'Vedi su ') + item.source;
    document.getElementById('panelCta').innerHTML =
      '<span>' + ctaText + '</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17 17 7M7 7h10v10"/></svg>';

    panel.classList.add('open');

    map.flyTo({
      center: [item.lng, item.lat],
      zoom: Math.max(map.getZoom(), 14),
      offset: window.innerWidth > 768 ? [-200, 0] : [0, -150],
      duration: 800,
      essential: true
    });
  }

  function closePanel() {
    panel.classList.remove('open');
    if (activeEl) {
      activeEl.classList.remove('active');
      activeEl = null;
    }
  }

  panelClose.addEventListener('click', closePanel);
  map.on('click', closePanel);

  // ============ FILTRI ============
  const chips = document.querySelectorAll('.chip');
  chips.forEach(function(chip) {
    chip.addEventListener('click', function() {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      const filter = chip.dataset.filter;
      markers.forEach(function(m) {
        if (filter === 'all') {
          m.el.style.display = '';
        } else {
          m.el.style.display = m.item.type === filter ? '' : 'none';
        }
      });
      closePanel();
    });
  });

  // ============ CONTROLLI ============
  document.getElementById('zoomIn').addEventListener('click', () => map.zoomIn({ duration: 300 }));
  document.getElementById('zoomOut').addEventListener('click', () => map.zoomOut({ duration: 300 }));
  document.getElementById('recenter').addEventListener('click', function() {
    map.flyTo({ center: SYDNEY_CENTER, zoom: 12.5, duration: 800 });
    closePanel();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePanel();
  });
})();
</script>

</body>
</html>
